<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YK PC Components Shop</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="shop.css">
</head>
<body>

    <nav class="navbar">
        <div class="nav-content">
            <div class="logo"><i class="fas fa-microchip"></i> YK Tech Shop</div>
            <div class="nav-right">
                <button id="themeToggleBtn" class="btn-logout" title="Toggle Theme"><i class="fas fa-moon"></i></button>
                <span id="welcomeUser" class="nav-user"></span>
                <button id="logoutBtn" class="btn-logout"><i class="fas fa-sign-out-alt"></i> Logout</button>
                <button id="purch" class="btn-purchases"><i class="fas fa-shopping-bag"></i> My Purchases</button>
            </div>
        </div>
    </nav>

    <main class="shop-container">
        <header class="shop-header">
            <h1>Premium PC Components</h1>
            <p>Upgrade your battle station with our top-tier hardware.</p>
        </header>

        <div class="filters-container">
            <div class="category-filters" id="categoryFilters">
                <button class="btn-filter active" data-type="all">All</button>
                <button class="btn-filter" data-type="GPU">GPU</button>
                <button class="btn-filter" data-type="CPU">CPU</button>
                <button class="btn-filter" data-type="RAM">RAM</button>
                <button class="btn-filter" data-type="Motherboard">Motherboard</button>
                <button class="btn-filter" data-type="Storage">Storage</button>
                <button class="btn-filter" data-type="PSU">PSU</button>
                <button class="btn-filter" data-type="Cooler">Cooler</button>
                <button class="btn-filter" data-type="Case">Case</button>
            </div>

            <div class="price-filter-container">
                <select id="priceFilter" class="price-select">
                    <option value="all">All Prices</option>
                    <option value="under100">Under 100 TND</option>
                    <option value="100to300">100 TND - 300 TND</option>
                    <option value="300to600">300 TND - 600 TND</option>
                    <option value="over600">Over 600 TND</option>
                </select>
                <select id="sortFilter" class="price-select" style="margin-left: 12px;">
                    <option value="default">Default Sort</option>
                    <option value="priceLowHigh">Price: Low to High</option>
                    <option value="priceHighLow">Price: High to Low</option>
                </select>
            </div>
        </div>

        <div class="products-grid" id="productsGrid">
            <!-- Products injected by JS -->
        </div>
    </main>

    <!-- Toast Notification -->
    <div id="toast" class="toast"></div>

    <!-- Product Details Modal -->
    <div id="detailsModal" class="modal-overlay" style="display: none;">
        <div class="modal-content" style="max-width: 600px;">
            <div class="modal-header">
                <h2 id="detailsTitle">Product Details</h2>
                <button id="closeDetailsBtn" class="action-btn"><i class="fas fa-times"></i></button>
            </div>
            <div id="detailsBody" style="display: flex; flex-direction: column; gap: 15px;">
                <!-- Content injected by JS -->
            </div>
            <div style="margin-top: 20px; display: flex; justify-content: flex-end; gap: 10px;">
                <button id="buyFromDetailsBtn" class="btn-buy" style="width: auto; padding: 10px 20px;"><i class="fas fa-shopping-cart"></i> Buy Now</button>
            </div>
        </div>
    </div>

    <!-- Checkout Modal -->
    <div id="checkoutModal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Complete Your Order</h2>
                <button id="closeModalBtn" class="action-btn"><i class="fas fa-times"></i></button>
            </div>
            <form id="checkoutForm">
                <input type="hidden" id="checkoutProductName">
                <input type="hidden" id="checkoutProductPrice">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="checkoutName" required placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="tel" id="checkoutPhone" required placeholder="+1 234 567 8900" pattern="^\+?[0-9\s\-\(\)]{8,20}$" title="Please enter a real phone number (minimum 8 digits).">
                </div>
                <div class="form-group">
                    <label>Shipping Address</label>
                    <textarea id="checkoutAddress" required placeholder="123 Main St, City, Country" rows="3"></textarea>
                </div>
                <div class="form-group" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div>
                        <label>Quantity</label>
                        <input type="number" id="checkoutQuantity" min="1" max="99" value="1" required>
                    </div>
                    <div>
                        <label>Payment Method</label>
                        <select id="checkoutPayment" required>
                            <option value="Credit Card">Credit Card</option>
                            <option value="PayPal">PayPal</option>
                            <option value="Cash on Delivery">Cash on Delivery</option>
                        </select>
                    </div>
                </div>
                <button type="submit" class="btn-buy" style="width: 100%; margin-top: 10px;">Confirm Purchase</button>
            </form>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>

    <script src="shop.js"></script>
</body>
</html>
